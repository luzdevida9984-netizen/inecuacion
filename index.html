<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Simulador de Inecuaciones Cuadráticas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #f0f4f8; font-family: 'Segoe UI', sans-serif; }
        .canvas-container { background: white; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="p-8">
    <div class="max-w-4xl mx-auto canvas-container p-6">
        <h1 class="text-3xl font-bold text-center text-blue-900 mb-6">Simulador de Inecuaciones Cuadráticas</h1>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="space-y-4">
                <div class="p-4 bg-slate-50 rounded-lg border">
                    <h2 class="font-bold text-lg mb-4">Configurar $ax^2 + bx + c > 0$</h2>
                    <label>A: <input type="range" id="a" min="-5" max="5" step="0.5" value="1" class="w-full"></label>
                    <label>B: <input type="range" id="b" min="-10" max="10" step="1" value="0" class="w-full"></label>
                    <label>C: <input type="range" id="c" min="-10" max="10" step="1" value="-4" class="w-full"></label>
                </div>
                <div id="resultado" class="text-lg font-mono bg-blue-100 p-4 rounded text-blue-800"></div>
            </div>
            <div class="flex flex-col items-center">
                <canvas id="plot" width="400" height="300" class="border rounded bg-white"></canvas>
                <p class="text-sm text-gray-500 mt-2">Visualización de la parábola</p>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('plot');
        const ctx = canvas.getContext('2d');
        const inputs = ['a', 'b', 'c'];
        
        function draw() {
            const a = parseFloat(document.getElementById('a').value);
            const b = parseFloat(document.getElementById('b').value);
            const c = parseFloat(document.getElementById('c').value);
            
            ctx.clearRect(0,0,400,300);
            ctx.strokeStyle = '#3b82f6';
            ctx.beginPath();
            
            for(let x = -20; x <= 20; x += 0.1) {
                let y = a*(x*x) + b*x + c;
                let screenX = (x * 15) + 200;
                let screenY = 150 - (y * 15);
                if(x === -20) ctx.moveTo(screenX, screenY);
                else ctx.lineTo(screenX, screenY);
            }
            ctx.stroke();
            
            // Ejes
            ctx.strokeStyle = '#cbd5e1';
            ctx.beginPath();
            ctx.moveTo(200,0); ctx.lineTo(200,300);
            ctx.moveTo(0,150); ctx.lineTo(400,150);
            ctx.stroke();

            const disc = b*b - 4*a*c;
            document.getElementById('resultado').innerText = `Discriminante (Δ): ${disc.toFixed(2)}`;
        }
        
        inputs.forEach(id => document.getElementById(id).addEventListener('input', draw));
        draw();
    </script>
</body>
</html>
